name: Sync OeVK + EM/WM data from OpenPowerlifting

on:
  schedule:
    # Täglich um 03:30 UTC (≈ 04:30/05:30 in Österreich)
    - cron: "30 3 * * *"
  workflow_dispatch:   # erlaubt manuelles Auslösen über die GitHub-UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Keep-alive lebt in einer separaten Workflow-Datei (.github/workflows/keep-alive.yml).
      # Ein simpler curl-Ping reicht NICHT — Streamlit Cloud zeigt asleep-Seiten mit HTTP 200
      # und erfordert echte JS-Interaktion zum Wecken.

      - name: Checkout this repo
        uses: actions/checkout@v5

      - name: Set up Python (for intl-CSV build)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # ------------------------------------------------------------
      # Schritt A · OeVK-Domestikmeets aus dem Upstream übernehmen
      # ------------------------------------------------------------
      - name: "Clone upstream OpenPowerlifting (sparse oevk + ipf + epf)"
        run: |
          git clone --depth=1 --filter=blob:none --sparse \
            https://gitlab.com/openpowerlifting/opl-data.git _upstream
          cd _upstream
          git sparse-checkout set meet-data/oevk meet-data/ipf meet-data/epf

      - name: Stage upstream data locally (oevk + ipf + epf)
        run: |
          rm -rf meet-data/oevk meet-data/ipf meet-data/epf
          mkdir -p meet-data
          cp -r _upstream/meet-data/oevk meet-data/oevk
          cp -r _upstream/meet-data/ipf  meet-data/ipf
          cp -r _upstream/meet-data/epf  meet-data/epf

      # ------------------------------------------------------------
      # Schritt B · EM/WM (ipf+epf) auf Österreicher:innen vorfiltern
      # → kleine CSV (~50 KB) committen, full folders nicht
      # ------------------------------------------------------------
      - name: Build pre-filtered Austrian EM/WM CSV
        run: |
          python scripts/build_intl_csv.py
          # Räumen: die großen Federation-Folder NICHT committen, nur die kleine CSV
          rm -rf meet-data/ipf meet-data/epf
          rm -rf _upstream

      - name: Write check marker (.last_check)
        run: |
          date -u +'%Y-%m-%dT%H:%M:%SZ' > .last_check
          echo "Wrote $(cat .last_check) to .last_check"

      - name: Detect NEW in-window meets & write .last_data_update only then
        id: detect
        run: |
          # Immer die aktuellen OeVK-Daten + intl-CSV stagen (werden ohnehin committet).
          git add -f meet-data/oevk project-data/oevk_intl.csv
          # "Daten zuletzt aktualisiert" soll NUR vorrücken, wenn ein neuer Wettkampf
          # IM Qualifikationsfenster hinzukommt — nicht bei OpenPowerlifting-Backfills
          # alter Meets oder täglichem Re-Processing. Dazu Signatur der fensterrelevanten
          # Meets vergleichen (scripts/data_signature.py).
          python scripts/data_signature.py > .data_meets.new
          if [ -f .data_meets ] && diff -q .data_meets .data_meets.new >/dev/null 2>&1; then
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
            echo "Kein neuer Wettkampf im Fenster."
            rm -f .data_meets.new
          else
            echo "data_changed=true" >> "$GITHUB_OUTPUT"
            mv .data_meets.new .data_meets
            date -u +'%Y-%m-%dT%H:%M:%SZ' > .last_data_update
            echo "Neuer Wettkampf im Fenster erkannt — .last_data_update geschrieben."
          fi

      - name: Commit & push
        run: |
          git config user.name  "oevk-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f .last_check
          if [ "${{ steps.detect.outputs.data_changed }}" = "true" ]; then
            git add -f .last_data_update .data_meets
            # Streamlit Cloud redeployt nur bei Quellcode-Änderungen, nicht bei reinen
            # Datei-Commits. Daher den DATA_VERSION-Marker im Haupt-Skript auf das
            # heutige Datum setzen, damit die neuen Meets live sichtbar werden.
            DV=$(date -u +'%Y-%m-%d')
            sed -i -E "s/^# DATA_VERSION: .*/# DATA_VERSION: ${DV}/" my_analysis/oevk_dashboard.py
            git add -f my_analysis/oevk_dashboard.py
            git commit -m "chore(data): sync OeVK + EM/WM ($(date -u +'%Y-%m-%d'))"
          else
            if git diff --cached --quiet; then
              git commit --allow-empty -m "chore(data): sync check ($(date -u +'%Y-%m-%d %H:%M UTC')) — keine neuen Daten"
            else
              git commit -m "chore(data): sync check ($(date -u +'%Y-%m-%d %H:%M UTC')) — keine neuen Daten"
            fi
          fi
          git push
